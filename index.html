<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>David Ceraso</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #ffffff;
            color: #000000;
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        p {
            font-size: clamp(1.125rem, 4vw, 1.5rem);
            line-height: 1.6;
            font-weight: 400;
            margin-bottom: 2rem;
        }

        a {
            color: #0066ff;
            text-decoration: none;
            font-size: clamp(1.125rem, 4vw, 1.5rem);
            font-weight: 400;
            word-break: break-word;
        }

        a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            body {
                padding: 1.5rem;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 1.25rem;
            }

            p {
                margin-bottom: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <p>David Ceraso is a creative based in New York City. David is currently working as a Design Manager for the Walt Disney Company.</p>
        <a href="mailto:david.ceraso@gmail.com">david.ceraso@gmail.com</a>
    </div>
</body>
</html>
