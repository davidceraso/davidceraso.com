<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>David Ceraso</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Source+Sans+3:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --accent: #e8c547;
            --accent-dim: #c9a93d;
            --text-primary: #f5f5f7;
            --text-secondary: #8a8a9a;
            --text-muted: #5a5a6a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Source Sans 3', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .background {
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(232, 197, 71, 0.08), transparent),
                radial-gradient(ellipse 60% 40% at 80% 100%, rgba(232, 197, 71, 0.05), transparent),
                linear-gradient(180deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            z-index: -1;
        }

        .grid-overlay {
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(232, 197, 71, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(232, 197, 71, 0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: -1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        header {
            padding: 2rem 0;
            animation: fadeDown 0.8s ease-out;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.25rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            color: var(--accent);
        }

        main {
            min-height: calc(100vh - 200px);
            display: flex;
            align-items: center;
            padding: 4rem 0;
        }

        .hero {
            display: grid;
            grid-template-columns: 1fr;
            gap: 3rem;
            width: 100%;
        }

        .hero-content {
            animation: fadeUp 1s ease-out 0.2s both;
        }

        .greeting {
            font-size: 0.875rem;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .greeting::before {
            content: '';
            display: block;
            width: 40px;
            height: 1px;
            background: var(--accent);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3rem, 8vw, 5.5rem);
            font-weight: 400;
            line-height: 1.1;
            margin-bottom: 1.5rem;
        }

        h1 span {
            display: block;
            color: var(--text-secondary);
            font-style: italic;
        }

        .tagline {
            font-size: 1.25rem;
            font-weight: 300;
            color: var(--text-secondary);
            max-width: 500px;
            line-height: 1.7;
            margin-bottom: 3rem;
        }

        .cta-group {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            animation: fadeUp 1s ease-out 0.4s both;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem 2rem;
            font-family: 'Source Sans 3', sans-serif;
            font-size: 0.875rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: var(--accent);
            color: var(--bg-primary);
        }

        .btn-primary:hover {
            background: var(--accent-dim);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(232, 197, 71, 0.2);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-primary);
            border: 1px solid var(--text-muted);
        }

        .btn-secondary:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .social-links {
            display: flex;
            gap: 2rem;
            margin-top: 4rem;
            animation: fadeUp 1s ease-out 0.6s both;
        }

        .social-links a {
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.3s ease;
            position: relative;
        }

        .social-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--accent);
            transition: width 0.3s ease;
        }

        .social-links a:hover {
            color: var(--accent);
        }

        .social-links a:hover::after {
            width: 100%;
        }

        footer {
            padding: 2rem 0;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            animation: fadeUp 1s ease-out 0.8s both;
        }

        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .footer-content p {
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 0.05em;
        }

        .scroll-indicator {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            animation: fadeIn 1s ease-out 1s both;
        }

        .scroll-indicator span {
            font-size: 0.625rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-muted);
            writing-mode: vertical-rl;
        }

        .scroll-indicator::after {
            content: '';
            width: 1px;
            height: 60px;
            background: linear-gradient(to bottom, var(--accent), transparent);
            animation: scrollPulse 2s ease-in-out infinite;
        }

        @keyframes fadeDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes scrollPulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        @media (max-width: 768px) {
            .container {
                padding: 0 1.5rem;
            }

            .social-links {
                gap: 1.5rem;
            }

            .scroll-indicator {
                display: none;
            }

            .footer-content {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="grid-overlay"></div>

    <header>
        <div class="container">
            <div class="logo">DC</div>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="hero">
                <div class="hero-content">
                    <p class="greeting">Welcome</p>
                    <h1>
                        David Ceraso
                        <span>Creative Developer</span>
                    </h1>
                    <p class="tagline">
                        Building digital experiences at the intersection of design and technology. 
                        Crafting solutions that matter.
                    </p>
                    <div class="cta-group">
                        <a href="#work" class="btn btn-primary">View Work</a>
                        <a href="#contact" class="btn btn-secondary">Get in Touch</a>
                    </div>
                    <div class="social-links">
                        <a href="#">LinkedIn</a>
                        <a href="#">GitHub</a>
                        <a href="#">Twitter</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="footer-content">
                <p>© 2026 David Ceraso. All rights reserved.</p>
                <p>Designed & Built with precision</p>
            </div>
        </div>
    </footer>

    <div class="scroll-indicator">
        <span>Scroll</span>
    </div>
</body>
</html>
