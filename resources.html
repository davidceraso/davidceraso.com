            transition: all 0.2s ease;
        }

            background-color: #0000FF;
            color: #ffffff;
        }

        .pdf-embed {
            width: 100%;
            height: 80vh;
            border: 1px solid #0000FF;
        }

            text-align: center;
            padding: 64px 24px;
